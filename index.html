<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QuoteScroll</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #080810;
            --card-bg: #10101c;
            --text: #f0f0f8;
            --text-muted: #7070a0;
            --nav-h: 68px;
            --top-h: 108px;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* ── TOP BAR ── */
        #topbar {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            padding: 14px 16px 0;
            background: linear-gradient(to bottom, rgba(8,8,16,1) 70%, transparent);
        }

        #app-title {
            font-size: 24px;
            font-weight: 900;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #c084fc, #818cf8, #38bdf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            line-height: 1;
        }

        #genre-filter {
            display: flex;
            gap: 7px;
            overflow-x: auto;
            padding-bottom: 10px;
            scrollbar-width: none;
        }
        #genre-filter::-webkit-scrollbar { display: none; }

        .chip {
            flex-shrink: 0;
            padding: 5px 13px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            border: 1.5px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.04);
            color: var(--text-muted);
            transition: all 0.2s ease;
            white-space: nowrap;
            letter-spacing: 0.2px;
        }
        .chip.active {
            border-color: currentColor;
            background: rgba(192,132,252,0.15);
            color: #c084fc;
        }

        /* ── FEED ── */
        #feed {
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scrollbar-width: none;
            padding-top: var(--top-h);
            padding-bottom: var(--nav-h);
        }
        #feed::-webkit-scrollbar { display: none; }

        /* ── QUOTE CARD ── */
        .q-card {
            scroll-snap-align: start;
            height: calc(100vh - var(--top-h) - var(--nav-h));
            min-height: 380px;
            margin: 0 12px 10px;
            border-radius: 22px;
            padding: 22px 22px 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.07);
            transition: transform 0.1s;
        }

        /* Subtle glow overlay per genre */
        .q-card::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 22px;
            pointer-events: none;
            opacity: 0.07;
        }

        /* Genre themes */
        .g-self-help   { background: linear-gradient(160deg,#130d2a,#0c102a); }
        .g-self-help::after { background: linear-gradient(135deg,#c084fc,#6366f1); }
        .g-self-help .gbadge { background: rgba(192,132,252,.18); color: #c084fc; }

        .g-philosophy  { background: linear-gradient(160deg,#0b1e18,#091520); }
        .g-philosophy::after { background: linear-gradient(135deg,#34d399,#059669); }
        .g-philosophy .gbadge { background: rgba(52,211,153,.18); color: #34d399; }

        .g-business    { background: linear-gradient(160deg,#1c1504,#190f00); }
        .g-business::after { background: linear-gradient(135deg,#fbbf24,#f59e0b); }
        .g-business .gbadge { background: rgba(251,191,36,.18); color: #fbbf24; }

        .g-psychology  { background: linear-gradient(160deg,#0c1230,#110c30); }
        .g-psychology::after { background: linear-gradient(135deg,#818cf8,#6366f1); }
        .g-psychology .gbadge { background: rgba(129,140,248,.18); color: #818cf8; }

        .g-spirituality { background: linear-gradient(160deg,#1e0c24,#180c1e); }
        .g-spirituality::after { background: linear-gradient(135deg,#f472b6,#ec4899); }
        .g-spirituality .gbadge { background: rgba(244,114,182,.18); color: #f472b6; }


        /* Card sections */
        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
        }

        .gbadge {
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
            padding: 5px 10px;
            border-radius: 8px;
            flex-shrink: 0;
        }

        .heart-btn {
            width: 38px; height: 38px;
            border: none;
            background: rgba(255,255,255,0.07);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
            transition: background 0.2s, transform 0.15s;
            position: relative;
            z-index: 2;
        }
        .heart-btn.on { background: rgba(239,68,68,0.2); }
        .heart-btn:active { transform: scale(0.85); }

        .card-body {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 16px 0 12px;
        }

        .qmark {
            font-family: Georgia, serif;
            font-size: 56px;
            line-height: 0.6;
            opacity: 0.15;
            margin-bottom: 6px;
            display: block;
        }

        .qtext {
            font-size: 19px;
            line-height: 1.65;
            font-weight: 500;
            color: rgba(240,240,248,0.95);
        }
        .qtext.sm { font-size: 16px; }

        .card-foot {
            border-top: 1px solid rgba(255,255,255,0.07);
            padding-top: 14px;
        }

        .book-title {
            font-size: 14px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 2px;
        }

        .book-author {
            font-size: 12px;
            color: var(--text-muted);
        }

        /* ── BOTTOM NAV ── */
        #nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: var(--nav-h);
            background: rgba(8,8,16,0.97);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-top: 1px solid rgba(255,255,255,0.07);
            display: flex;
            z-index: 100;
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.2px;
            transition: color 0.2s;
            padding-bottom: 4px;
        }
        .nav-item.on { color: #c084fc; }

        .nav-ico { font-size: 20px; line-height: 1; }

        /* ── VIEWS ── */
        .view { display: none; height: 100vh; overflow-y: auto; padding: 72px 14px var(--nav-h); }
        .view.on { display: block; }

        #v-feed { display: flex; flex-direction: column; padding: 0; overflow: hidden; }
        #v-feed.on { display: flex; }

        .view-head {
            font-size: 26px;
            font-weight: 900;
            letter-spacing: -0.5px;
            margin-bottom: 18px;
            background: linear-gradient(135deg,#c084fc,#818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Genres grid */
        .genre-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .genre-tile {
            border-radius: 18px;
            padding: 18px 16px 14px;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.07);
            transition: transform 0.15s, opacity 0.15s;
            position: relative;
            overflow: hidden;
        }
        .genre-tile::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 18px;
            opacity: 0.08;
            pointer-events: none;
        }
        .genre-tile:active { transform: scale(0.96); opacity: 0.8; }

        .tile-ico { font-size: 26px; margin-bottom: 8px; }
        .tile-name { font-size: 14px; font-weight: 800; }
        .tile-count { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

        /* Favorites */
        .fav-item {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 10px;
            border: 1px solid rgba(255,255,255,0.06);
        }

        .fav-q {
            font-size: 14px;
            line-height: 1.65;
            color: var(--text);
            margin-bottom: 10px;
        }

        .fav-foot {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .fav-meta { font-size: 12px; color: var(--text-muted); }
        .fav-meta strong { color: rgba(240,240,248,0.8); font-size: 12px; }

        .fav-del {
            border: none;
            background: rgba(255,255,255,0.06);
            color: var(--text-muted);
            border-radius: 8px;
            width: 28px; height: 28px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s, color 0.2s;
            display: flex; align-items: center; justify-content: center;
        }
        .fav-del:hover { background: rgba(239,68,68,0.2); color: #f87171; }

        /* Empty state */
        .empty {
            text-align: center;
            padding: 70px 20px 40px;
            color: var(--text-muted);
        }
        .empty-ico { font-size: 44px; margin-bottom: 14px; }
        .empty p { font-size: 15px; line-height: 1.6; }

        /* Toast */
        #toast {
            position: fixed;
            bottom: calc(var(--nav-h) + 14px);
            left: 50%;
            transform: translateX(-50%) translateY(12px);
            background: rgba(192,132,252,0.95);
            color: #fff;
            padding: 9px 18px;
            border-radius: 22px;
            font-size: 13px;
            font-weight: 700;
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s, transform 0.25s;
            white-space: nowrap;
            box-shadow: 0 4px 20px rgba(192,132,252,0.35);
        }
        #toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* Heart pop animation */
        @keyframes pop {
            0%   { transform: scale(1); }
            40%  { transform: scale(1.45); }
            70%  { transform: scale(0.9); }
            100% { transform: scale(1.1); }
        }
        .pop { animation: pop 0.35s ease forwards; }

        /* ── QUOTE REVEAL ANIMATIONS ── */
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(18px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes wordIn {
            from { opacity: 0; transform: translateY(10px) scale(0.96); filter: blur(3px); }
            to   { opacity: 1; transform: translateY(0)  scale(1);    filter: blur(0); }
        }
        @keyframes fadeSlideIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .q-card { opacity: 0; }
        .q-card.revealed { animation: cardIn 0.45s cubic-bezier(0.22,1,0.36,1) forwards; }

        .qmark-wrap { display: block; opacity: 0; }
        .q-card.revealed .qmark-wrap {
            animation: fadeSlideIn 0.4s ease forwards;
            animation-delay: 0.1s;
        }

        .word {
            display: inline-block;
            opacity: 0;
            white-space: pre;
        }
        .q-card.revealed .word {
            animation: wordIn 0.35s cubic-bezier(0.22,1,0.36,1) forwards;
        }

        .card-foot { opacity: 0; }
        .q-card.revealed .card-foot {
            animation: fadeSlideIn 0.5s ease forwards;
        }

        /* Fav badge on nav */
        .nav-badge {
            position: absolute;
            top: 8px;
            right: calc(50% - 18px);
            background: #c084fc;
            color: white;
            font-size: 9px;
            font-weight: 800;
            min-width: 16px;
            height: 16px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 4px;
        }
    </style>
</head>
<body>

<!-- TOP BAR (feed only) -->
<div id="topbar">
    <div id="app-title">QuoteScroll</div>
    <div id="genre-filter"></div>
</div>

<!-- VIEW: FEED -->
<div id="v-feed" class="view on">
    <div id="feed"></div>
</div>

<!-- VIEW: GENRES -->
<div id="v-genres" class="view">
    <div class="view-head">Explore Genres</div>
    <div class="genre-grid" id="genre-grid"></div>
</div>

<!-- VIEW: FAVORITES -->
<div id="v-favorites" class="view">
    <div class="view-head">Saved Quotes</div>
    <div id="fav-list"></div>
</div>

<!-- BOTTOM NAV -->
<nav id="nav">
    <button class="nav-item on" data-v="feed" onclick="goView('feed')">
        <span class="nav-ico">✦</span>
        <span>Feed</span>
    </button>
    <button class="nav-item" data-v="genres" onclick="goView('genres')">
        <span class="nav-ico">◉</span>
        <span>Genres</span>
    </button>
    <button class="nav-item" data-v="favorites" onclick="goView('favorites')" style="position:relative">
        <span class="nav-ico" id="fav-ico">♡</span>
        <span>Saved</span>
        <span class="nav-badge" id="fav-badge" style="display:none"></span>
    </button>
</nav>

<!-- TOAST -->
<div id="toast"></div>

function renderChips() {
    const el = document.getElementById('genre-filter');
    const all = [{id:'all', name:'All', ico:'✦'}].concat(GENRES);
    el.innerHTML = all.map(g =>
        `<button class="chip ${g.id === activeGenre ? 'active' : ''}" onclick="setGenre('${g.id}')">${g.ico} ${g.name}</button>`
    ).join('');
}

// ─────────────────────────────────────────────
//  FEED
// ─────────────────────────────────────────────
function renderFeed() {
    const feed = document.getElementById('feed');
    const pool = activeGenre === 'all' ? QUOTES : QUOTES.filter(q => q.g === activeGenre);
    shuffledFeed = shuffle([...pool]);

    feed.innerHTML = shuffledFeed.map(q => {
        const saved = favs.some(f => f.id === q.id);
        const long  = q.q.length > 160;
        const words = (q.q + '"').split(' ').map((w, i) =>
            `<span class="word" style="animation-delay:${0.2 + i * 0.045}s">${w} </span>`
        ).join('');
        return `
        <div class="q-card g-${q.g}">
            <div class="card-top">
                <span class="gbadge">${genreName(q.g)}</span>
                <button class="heart-btn ${saved ? 'on' : ''}" data-id="${q.id}" onclick="toggleFav(${q.id}, this)">
                    ${saved ? '❤️' : '🤍'}
                </button>
            </div>
            <div class="card-body">
                <span class="qmark-wrap qmark">"</span>
                <p class="qtext ${long ? 'sm' : ''}">${words}</p>
            </div>
            <div class="card-foot" style="animation-delay:${0.2 + (q.q.split(' ').length * 0.045) + 0.15}s">
                <div class="book-title">${q.book}</div>
                <div class="book-author">— ${q.by}</div>
            </div>
        </div>`;
    }).join('');

    feed.scrollTop = 0;
    setTimeout(initRevealObserver, 60);
}

// ─────────────────────────────────────────────
//  GENRES VIEW
// ─────────────────────────────────────────────
function renderGenres() {
    const grid = document.getElementById('genre-grid');
    grid.innerHTML = GENRES.map(g => {
        const count = QUOTES.filter(q => q.g === g.id).length;
        return `
        <div class="q-card g-${g.id} genre-tile" onclick="pickGenre('${g.id}')">
            <div class="tile-ico">${g.ico}</div>
            <div class="tile-name" style="color:${g.color}">${g.name}</div>
            <div class="tile-count">${count} quotes</div>
        </div>`;
    }).join('');
}

// ─────────────────────────────────────────────
//  FAVORITES VIEW
// ─────────────────────────────────────────────
function renderFavs() {
    const el = document.getElementById('fav-list');
    if (!favs.length) {
        el.innerHTML = `<div class="empty">
            <div class="empty-ico">🤍</div>
            <p>No saved quotes yet.<br>Tap the heart on any card to save it here.</p>
        </div>`;
        return;
    }
    el.innerHTML = favs.map(q => `
        <div class="fav-item" id="fi-${q.id}">
            <div class="fav-q">"${q.q}"</div>
            <div class="fav-foot">
                <div class="fav-meta"><strong>${q.book}</strong> — ${q.by}</div>
                <button class="fav-del" onclick="delFav(${q.id})" title="Remove">✕</button>
            </div>
        </div>`
    ).join('');
}

// ─────────────────────────────────────────────
//  ACTIONS
// ─────────────────────────────────────────────
function setGenre(g) {
    activeGenre = g;
    renderChips();
    renderFeed();
}

function pickGenre(g) {
    activeGenre = g;
    renderChips();
    renderFeed();
    goView('feed');
}

function toggleFav(id, btn) {
    const q = QUOTES.find(x => x.id === id);
    const idx = favs.findIndex(f => f.id === id);
    if (idx === -1) {
        favs.push(q);
        btn.innerHTML = '❤️';
        btn.classList.add('on');
        btn.classList.add('pop');
        setTimeout(() => btn.classList.remove('pop'), 400);
        toast('Saved to favorites!');
    } else {
        favs.splice(idx, 1);
        btn.innerHTML = '🤍';
        btn.classList.remove('on');
        toast('Removed from saved');
    }
    save();
    updateBadge();
}

function delFav(id) {
    favs = favs.filter(f => f.id !== id);
    // sync feed heart
    const btn = document.querySelector(`.heart-btn[data-id="${id}"]`);
    if (btn) { btn.innerHTML = '🤍'; btn.classList.remove('on'); }
    save();
    updateBadge();
    renderFavs();
}

function goView(v) {
    document.querySelectorAll('.view').forEach(el => el.classList.remove('on'));
    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('on'));
    document.getElementById(`v-${v}`).classList.add('on');
    document.querySelector(`[data-v="${v}"]`).classList.add('on');
    document.getElementById('topbar').style.display = v === 'feed' ? '' : 'none';
    if (v === 'favorites') renderFavs();
    if (v === 'genres')    renderGenres();
}

// ─────────────────────────────────────────────
//  HELPERS
// ─────────────────────────────────────────────
function genreName(id) {
    const g = GENRES.find(x => x.id === id);
    return g ? g.name : id;
}

function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

function save() {
    localStorage.setItem('qs_favs', JSON.stringify(favs));
}

function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._t);
    t._t = setTimeout(() => t.classList.remove('show'), 2200);
}

function updateBadge() {
    const badge = document.getElementById('fav-badge');
    const ico   = document.getElementById('fav-ico');
    if (favs.length) {
        badge.textContent = favs.length;
        badge.style.display = 'flex';
        ico.textContent = '♥';
    } else {
        badge.style.display = 'none';
        ico.textContent = '♡';
    }
}

// ─────────────────────────────────────────────
//  CARD REVEAL OBSERVER
// ─────────────────────────────────────────────
let revealObserver = null;

function initRevealObserver() {
    if (revealObserver) revealObserver.disconnect();
    revealObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting && entry.intersectionRatio >= 0.6) {
                const card = entry.target;
                card.classList.remove('revealed');
                void card.offsetWidth;
                card.classList.add('revealed');
            }
        });
    }, { threshold: 0.6 });
    document.querySelectorAll('#feed .q-card').forEach(card => {
        card.setAttribute('data-observed', '1');
        revealObserver.observe(card);
    });
}

// ─────────────────────────────────────────────
//  INFINITE SCROLL
// ─────────────────────────────────────────────
function appendMoreCards() {
    const feed = document.getElementById('feed');
    const pool = activeGenre === 'all' ? QUOTES : QUOTES.filter(q => q.g === activeGenre);
    const batch = shuffle([...pool]);

    const frag = document.createDocumentFragment();
    batch.forEach(q => {
        const saved = favs.some(f => f.id === q.id);
        const long  = q.q.length > 160;
        const words = (q.q + '"').split(' ').map((w, i) =>
            `<span class="word" style="animation-delay:${0.2 + i * 0.045}s">${w} </span>`
        ).join('');
        const div = document.createElement('div');
        div.className = `q-card g-${q.g}`;
        div.innerHTML = `
            <div class="card-top">
                <span class="gbadge">${genreName(q.g)}</span>
                <button class="heart-btn ${saved ? 'on' : ''}" data-id="${q.id}" onclick="toggleFav(${q.id}, this)">
                    ${saved ? '❤️' : '🤍'}
                </button>
            </div>
            <div class="card-body">
                <span class="qmark-wrap qmark">"</span>
                <p class="qtext ${long ? 'sm' : ''}">${words}</p>
            </div>
            <div class="card-foot" style="animation-delay:${0.2 + (q.q.split(' ').length * 0.045) + 0.15}s">
                <div class="book-title">${q.book}</div>
                <div class="book-author">— ${q.by}</div>
            </div>`;
        frag.appendChild(div);
    });
    feed.appendChild(frag);

    // Observe the new cards
    feed.querySelectorAll('.q-card:not([data-observed])').forEach(card => {
        card.setAttribute('data-observed', '1');
        revealObserver && revealObserver.observe(card);
    });
}

function initInfiniteScroll() {
    const feed = document.getElementById('feed');
    feed.addEventListener('scroll', () => {
        const cards = feed.querySelectorAll('.q-card');
        if (!cards.length) return;
        const cardH  = cards[0].offsetHeight + 10; // card + margin
        const index  = Math.round(feed.scrollTop / cardH);
        if (index >= cards.length - 4) appendMoreCards();
    }, { passive: true });
}

// ─────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────
renderChips();
renderFeed();
updateBadge();
initInfiniteScroll();
</script>
</body>
</html>
